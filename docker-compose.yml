# Local stack: the app plus its dependencies -- PostgreSQL + pgvector (storage)
# and Ollama (embedding + generation). Bring the whole thing up with:
#
#   docker compose up -d --build      # app on http://localhost:8000
#   DATABASE_URL=postgresql://rag:rag@localhost:5435/rag uv run pytest -m integration
#
# Services reach each other by name on the internal network (db:5432,
# ollama:11434); the published ports are only for host access.
#
# Credentials default to local-dev values (rag/rag); override them via the shell
# or a .env file. These are NOT production secrets -- never point this at real data.
services:
  app:
    # The FastAPI app (see Dockerfile). DATABASE_URL and OLLAMA_* are built here
    # from the db/ollama service config, so the app talks to them over the
    # internal network -- no host ports, nothing to set by hand.
    build: .
    container_name: rag-app
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-rag}@db:5432/${POSTGRES_DB:-rag}"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-gemma2:2b}"
      OLLAMA_EMBED_MODEL: "${OLLAMA_EMBED_MODEL:-nomic-embed-text}"
    ports:
      - "${APP_PORT:-8000}:8000"
  db:
    # Postgres with the pgvector extension preinstalled (matches vector(768) in
    # db/schema.sql). Pinned to a major version for reproducibility.
    image: pgvector/pgvector:pg17
    container_name: rag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: ${POSTGRES_DB:-rag}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      # Persist data across restarts.
      - pgdata:/var/lib/postgresql/data
      # Applied once, only when the data volume is first created: creates the
      # vector extension and the documents/chunks tables. Delete the volume to
      # re-run it (docker compose down -v).
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    # Ollama runs both the embedding and generation models, so it is the only
    # service doing tensor maths — the app itself has no GPU dependency.
    #
    # CPU vs CUDA is switched with $OLLAMA_GPU_COUNT (see .env.example):
    #   0 (default) -> no devices reserved, Ollama runs on CPU, works everywhere
    #   all         -> every NVIDIA GPU is passed through and Ollama uses CUDA
    #   1, 2, ...   -> that many GPUs
    # Anything other than 0 needs the NVIDIA Container Toolkit on the host.
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      # Persist pulled models so they are not re-downloaded on restart.
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${OLLAMA_GPU_COUNT:-0}
              capabilities: [gpu]

  # One-shot helper: waits for the server, pulls the generation model and the
  # embedding model, then exits. `pull` is idempotent, so on later `up`s it just
  # confirms they are present. Override with $OLLAMA_MODEL (default gemma2:2b) and
  # $OLLAMA_EMBED_MODEL (default nomic-embed-text, 768-dim).
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - sh
      - -c
      - "ollama pull ${OLLAMA_MODEL:-gemma2:2b} && ollama pull ${OLLAMA_EMBED_MODEL:-nomic-embed-text}"
    restart: "no"

volumes:
  pgdata:
  ollama:
